	<script>
		const menuItems = document.querySelectorAll(".item");
		menuItems.forEach((item) =>
			item.addEventListener("click", function (event) {
				menuItems.forEach((el) => el.classList.remove("active"));
				event.target.classList.add("active");
			})
		);
	</script>
