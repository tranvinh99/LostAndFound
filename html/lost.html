<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->

        integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
        integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
    <title>Lost and Found on FPT University</title>
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
    <nav class="navbar navbar-default navbar-expand-sm fixed-top" id="navbar">
        <!-- navbar-dark -->
        <div class="container" id="nav_header">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#Navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand mr-auto" href="#"><img src="../images/logo.svg" height="50" width="150"></a>
            <div class="collapse navbar-collapse" id="Navbar">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item active" id="nav-item">
                        <a class="nav-link" href="#"><span class="fa fa-home fa-lg"></span> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="found.html">Found</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lost.html"> Lost</a>
                    </li>
                </ul>
                <span class="navbar-text">
                    <a id="loginButton">
                        <span class="fa fa-sign-in-alt "></span>Login</a>
                </span>
            </div>
        </div>
    </nav>
    <div id="loginModal" class="modal fade" role="dialog">
        <div class="modal-dialog modal-lg" role="content">
            <!-- Modal content-->
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="h3 mb-3 font-weight-normal" style="text-align: center"> Sign in</h1>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>

                <div id="logreg-forms" class="modal-body">
                    <form class="form-signin">
                        <div class="social-login">
                            <button class="btn facebook-btn social-btn btn-lg" type="button"><span><i
                                        class="fab fa-facebook-f "></i> Sign in with Facebook</span> </button>
                            <button class="btn google-btn social-btn btn-lg" type="button"><span><i
                                        class="fab fa-google-plus-g"></i> Sign in with Google+</span> </button>
                        </div>
                        <p style="text-align:center"> OR </p>
                        <input type="email" id="inputEmail" class="form-control" placeholder="Email address" required=""
                            autofocus="">
                        <input type="password" id="inputPassword" class="form-control" placeholder="Password"
                            required="">

                        <button class="btn btn-success btn-block" type="submit"><i class="fas fa-sign-in-alt"></i>
                            Sign in</button>
                        <a href="#" id="forgot_pswd">Forgot password?</a>
                        <hr>
                        <!-- <p>Don't have an account!</p>  -->
                        <button class="btn btn-primary btn-block" type="button" id="btn-signup"><i
                                class="fas fa-user-plus"></i> Sign up New Account</button>
                    </form>

                    <form action="/reset/password/" class="form-reset">
                        <input type="email" id="resetEmail" class="form-control" placeholder="Email address" required=""
                            autofocus="">
                        <button class="btn btn-primary btn-block" type="submit">Reset Password</button>
                        <a href="#" id="cancel_reset"><i class="fas fa-angle-left"></i> Back</a>
                    </form>

                    <form class="form-signup" id="form_signup" action="" method="">
                        <div class="social-login">
                            <button class="btn facebook-btn social-btn btn-lg" type="button"><span><i
                                        class="fab fa-facebook-f"></i> Sign up with Facebook</span> </button>
                        </div>
                        <div class="social-login">
                            <button class="btn google-btn social-btn btn-lg" type="button"><span><i
                                        class="fab fa-google-plus-g"></i> Sign up with Google+</span> </button>
                        </div>

                        <p style="text-align:center">OR</p>

                        <input type="text" id="user-name" class="form-control" placeholder="Full name" required=""
                            autofocus="" name="username">
                        <input type="email" id="user-email" class="form-control" placeholder="Email address" required
                            autofocus="" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                            title="Must contain @ and . example a@gmail.com/a@co.co">
                        <input type="password" id="password" class="form-control" placeholder="Password" required
                            autofocus="" name="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
                        <input type="password" id="repeatpw" class="form-control" placeholder="Repeat Password"
                            name="repeatpw" required autofocus="">
                        <button class="btn btn-primary btn-block" type="submit" id="signup-button"><i
                                class="fas fa-user-plus"></i>
                            Sign Up</button>
                        <a href="#" id="cancel_signup"><i class="fas fa-angle-left"></i> Back</a>
                    </form>

                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF"
        crossorigin="anonymous"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.min.js"
        integrity="sha384-VHvPCCyXqtD5DqJeNxl2dtTyhF78xXNXdkwX1CZeRusQfRKp+tA7hAShOK/B/fQ2"
        crossorigin="anonymous"></script>
    <script src="../js/myApp.js"></script>
</body>

</html>
